services:
  - type: web
    name: cfm-backend
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cfm-postgres
          property: connectionString

  - type: web
    name: cfm-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist

databases:
  - name: cfm-postgres
    plan: starter
