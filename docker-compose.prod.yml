services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cfm
      POSTGRES_USER: cfm_user
      POSTGRES_PASSWORD: change_me_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://cfm_user:change_me_secure_password@postgres:5432/cfm
      JWT_SECRET: change_me_long_random_secret
      CLIENT_URL: http://localhost:8080
    depends_on:
      - postgres
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
